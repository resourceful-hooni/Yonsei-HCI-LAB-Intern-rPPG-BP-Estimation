name: CI Maintenance

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Security audit (high, prod deps)
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

  backend-sanity:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Resolve requirements dry-run
        run: pip install --dry-run -r requirements.txt

      - name: Syntax check backend entry
        run: python -m py_compile app.py
